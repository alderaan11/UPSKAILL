name: Scrape Jobs

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:          # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Chromium + ChromeDriver (for Selenium)
        run: sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Install Playwright browser (for Indeed)
        run: uv run --with playwright python3 -m playwright install chromium --with-deps

      - name: Run scraper
        run: uv run scripts/scrape_jobs.py

      - name: Commit and trigger Vercel deploy if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/scraped-jobs.json
          if git diff --staged --quiet; then
            echo "No new jobs, skipping deploy"
          else
            git commit -m "chore: update scraped jobs [skip ci]"
            git push
            curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "Vercel deploy triggered"
          fi
