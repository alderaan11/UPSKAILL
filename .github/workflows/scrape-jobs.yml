name: Scrape Jobs

on:
  schedule:
    - cron: '0 6,18 * * *'  # 6am and 6pm UTC daily
  workflow_dispatch:          # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Playwright browser
        run: uv run --with playwright python3 -m playwright install chromium --with-deps

      - name: Run scraper
        run: uv run scripts/scrape_jobs.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/scraped-jobs.json
          git diff --staged --quiet || (git commit -m "chore: update scraped jobs [skip ci]" && git push)
