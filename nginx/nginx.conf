events {}

http {
  upstream client {
    server client:3000;
  }
  upstream server {
    server server:8000;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass         http://server;
      proxy_buffering    off;         # Required for SSE streaming
      proxy_cache        off;
      chunked_transfer_encoding on;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass         http://client;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }
  }
}
